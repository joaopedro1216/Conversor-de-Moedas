<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--o LINK A BAIXO É PARA A FONTE DE TEXTO QUE É USADA NO PROJETO (ROBOTO)-->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <!--link para CSS-->
        <link rel="stylesheet"  href="style.css">      
    <title>converter coins</title>
</head>
<body>
    <img class="logo" src="./assets/ConverterImagem.png" alt="gif-convert-money">

    <main>
        <div class="divDeTudo">
        <label>
                Converter <b>de</b>
                <select>
                    <option>R$ Real Brasileiro</option>
                    <option>US$ Dolar Americano</option>
                </select>
        </label>

         <label>
                Converter <b>para</b>
                <select class="currency-select">
                    <option value="euro">€ Euro</option>
                    <option value="real">R$ Real Brasileiro</option>
                    <option value="dolar">US$ Dolar Americano</option>
                    <option value="bitcoin">₿ Bitcoin</option>
                    <option value="libra">£ Libra</option>
                </select>
        </label>

        <label id="value">
            <b>Valor</b>
            <input type="number" class="input-currency" placeholder="Ex: R$10.000,00">
        </label>

        <button class="convert-button">Converter</button>

        <section>
            <div class="currency-box">
                <img class="logo-brasil imagem" src="./assets/Brasil-real.png" alt="logo-moeda-a-converter">
                <p class="currency">Real</p>
                <p class="currency-value-to-convert">R$ 0,00</p>
            </div>

            <img class="arrow-img" src="./assets/arrow_green_16C784.png" alt="seta">

            <div class="currency-box">
                <img id="logoUSA" class="logo-USA imagem" src="./assets/USA-dolar.png" alt="logo-moeda-convertida">
                <p id="currency-name" class="currency">Dolar</p>
                <p class="currency-value">US$ 0.0</p>
            </div>
        </section>


     </div>
    </main>
    
</body>
<script src="./Scripts.js"></script>

</html>
